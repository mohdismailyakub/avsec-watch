name: Daily AVSEC Watch

on:
  schedule:
    - cron: "0 23 * * *"   # 23:00 UTC = 07:00 MYT (Sarawak)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: avsec-watch
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Pull intel + send email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: node pull.mjs

      - name: Commit updated data.json (conflict-proof)
        run: |
          git config user.name  "avsec-bot"
          git config user.email "actions@users.noreply.github.com"
          cp data.json /tmp/data.json.new
          for i in 1 2 3 4 5; do
            echo "Push attempt $i..."
            git fetch origin main
            git reset --hard origin/main      # take latest remote as clean base
            cp /tmp/data.json.new data.json   # bot's version wins
            git add data.json
            if git diff --staged --quiet; then
              echo "No data.json changes to commit."
              exit 0
            fi
            git commit -m "Daily AVSEC pull"
            if git push origin main; then
              echo "Pushed successfully."
              exit 0
            fi
            echo "Remote moved ahead — retrying in 5s..."
            sleep 5
          done
          echo "Push still failing after 5 attempts."
          exit 1
